# /etc/systemd/system/dnsmasq.service.d/after-hostapd.conf
#
# Problem: on boot dnsmasq sometimes starts before hostapd has finished
# bringing wlan0 up, so dnsmasq's ExecStartPre checkconfig reports
# "unknown interface wlan0" and the service fails.
#
# Fix: tell systemd to always start dnsmasq *after* hostapd, and
# automatically restart it on failure with a short back-off so that even
# if the race is lost it recovers without manual intervention.

[Unit]
# Extend (not replace) the existing After= ordering.
After=hostapd.service
# Pulling in Wants= means systemd will start hostapd automatically when
# dnsmasq is requested, keeping boot behaviour intact even if hostapd is
# somehow not yet queued.
Wants=hostapd.service

[Service]
# Restart the service if it exits with a non-zero code (the "unknown
# interface" failure exits 2/INVALIDARGUMENT, caught by on-failure).
Restart=on-failure
# Wait 3 s before each restart attempt so we don't spin tightly while
# hostapd is still initialising the interface.
RestartSec=3s
# Allow up to 5 restart attempts within a 60-second window before
# systemd gives up and marks the service as permanently failed.
StartLimitIntervalSec=60
StartLimitBurst=5
