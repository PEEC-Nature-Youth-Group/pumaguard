# /etc/systemd/system/hostapd.service.d/wait-wlan0.conf
#
# Problem: hostapd's own service unit uses Type=forking, which means systemd
# considers it "started" as soon as the daemon process has forked.  At that
# point the wlan0 interface may not yet have carrier / operstate UP, so any
# service ordered After=hostapd.service (e.g. dnsmasq) can still lose the
# race when it tries to bind to wlan0.
#
# Fix: add an ExecStartPost that blocks until the kernel reports wlan0 as
# fully operational.  systemd only advances past the hostapd start job once
# ExecStartPost exits 0, so all After= dependents are held until then.

[Service]
# Wait up to 15 seconds for wlan0 to reach operstate "up".
# /sys/class/net/<iface>/operstate transitions:
#   unknown -> dormant -> up   (normal hostapd bring-up path)
# We poll every 250 ms to keep boot latency low.
ExecStartPost=/bin/sh -c '\
  i=0; \
  while [ $i -lt 60 ]; do \
    state=$(cat /sys/class/net/wlan0/operstate 2>/dev/null || echo "missing"); \
    [ "$state" = "up" ] && exit 0; \
    sleep 0.25; \
    i=$((i + 1)); \
  done; \
  echo "hostapd-wait-wlan0: timed out waiting for wlan0 operstate=up" >&2; \
  exit 1'
